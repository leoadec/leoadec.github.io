name: Deploy to server

on:
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Python dependencies
        run: |
          pip install pipenv
          pipenv --python $(which python) install
      - name: Build website
        run: |
          pipenv --python $(which python) run python src/build
      - name: Upload artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.build.outputs.artifact_id }}
        path: _site/
    - name: Untar the artifact
      run: |
        tar xf _site/artifact.tar -C _site
        rm _site/artifact.tar
        ls
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    - name: Pull Vercel environment information
      run: vercel pull --yes --cwd _site --token=${{ secrets.VERCEL_TOKEN }}
    - name: Build project artifacts
      run: vercel build --cwd _site --token=${{ secrets.VERCEL_TOKEN }} --prod
    - name: Deploy project artifacts to Vercel
      run: vercel deploy --prebuilt --cwd _site --token=${{ secrets.VERCEL_TOKEN }} --prod

  deploy-github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
